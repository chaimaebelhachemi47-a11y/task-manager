<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Task Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            color: #333;
        }
        nav {
            background: #2a6099;
            padding: 14px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav h1 { color: white; font-size: 20px; }
        nav a {
            color: #cde; text-decoration: none;
            margin-left: 20px; font-size: 14px;
        }
        nav a:hover { color: white; }
        .container {
            max-width: 960px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary { background: #2a6099; color: white; }
        .btn-danger  { background: #cc3333; color: white; }
        .btn-success { background: #2d6a2d; color: white; }
        .btn-warning { background: #b37400; color: white; }
        .btn:hover { opacity: 0.85; }
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            border-left: 5px solid #2a6099;
        }
        .card.high   { border-left-color: #cc3333; }
        .card.medium { border-left-color: #b37400; }
        .card.low    { border-left-color: #2d6a2d; }
        .card.done   { opacity: 0.55; }
        .card h3 { margin-bottom: 6px; font-size: 16px; }
        .card p  { font-size: 13px; color: #666; margin-bottom: 4px; }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            margin-right: 6px;
        }
        .badge-high   { background:#fde; color:#cc3333; }
        .badge-medium { background:#fef3cd; color:#b37400; }
        .badge-low    { background:#d4edda; color:#2d6a2d; }
        .badge-cat    { background:#e8f0fe; color:#2a6099; }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 13px;
        }
        .error {
            background: #fde;
            color: #cc3333;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 16px;
            font-size: 13px;
        }
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-bar input {
            flex: 1;
            padding: 9px 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <nav>
    <div>
        <h1 style="font-size:20px">📋 Task Manager</h1>
        <div style="font-size:11px;color:#a8c8e8;
                    margin-top:2px">
            知媛 · Jingdezhen Ceramic University
        </div>
    </div>
    <div>
        <a href="/">All Tasks</a>
        <a href="/calendar">📅 Calendar</a>
        <a href="/add" class="btn btn-primary"
           style="margin-left:20px">+ Add Task</a>
    </div>
</nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
